mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
routing-mark: 7894
allow-lan: true
ipv6: true
mode: rule
unified-delay: true
tcp-concurrent: true
find-process-mode: off
log-level: info
geodata-loader: standard
external-controller: :9999
disable-keep-alive: false
profile:
  store-selected: true
proxy-groups:
  - name: 选择代理
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    type: select
    proxies:
      - 落地节点
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 低倍率节点
      - 手动选择
      - DIRECT
  - name: 手动选择
    icon: https://gcore.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png
    include-all: true
    type: select
  - name: 前置代理
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Area.png
    type: select
    include-all: true
    exclude-filter: (?i)家宽|家庭|家庭宽带|商宽|商业宽带|星链|Starlink|落地
    proxies:
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 低倍率节点
      - 手动选择
      - DIRECT
  - name: 落地节点
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Airport.png
    type: select
    include-all: true
    filter: (?i)家宽|家庭|家庭宽带|商宽|商业宽带|星链|Starlink|落地
  - name: AI
    icon: https://gcore.jsdelivr.net/gh/originalix/override-rules@master/icons/chatgpt.png
    type: select
    proxies: &a1
      - 选择代理
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 低倍率节点
      - 手动选择
      - DIRECT
  - name: Crypto
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Cryptocurrency_3.png
    type: select
    proxies: *a1
  - name: GitHub
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png
    type: select
    proxies: *a1
  - name: Discord
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png
    type: select
    proxies: *a1
  - name: 低倍率节点
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Lab.png
    type: select
    include-all: true
    filter: (?i)0.[0-5]|低倍率|省流|大流量|实验性
  - name: 香港节点
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png
    include-all: true
    filter: 香港|港|HK|hk|Hong Kong|HongKong|hongkong|🇭🇰
    exclude-filter: (?i)家宽|家庭|家庭宽带|商宽|商业宽带|星链|Starlink|落地|0\.[0-5]|低倍率|省流|大流量|实验性
    type: load-balance
  - name: 台湾节点
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png
    include-all: true
    filter: 台|新北|彰化|TW|Taiwan|🇹🇼
    exclude-filter: (?i)家宽|家庭|家庭宽带|商宽|商业宽带|星链|Starlink|落地|0\.[0-5]|低倍率|省流|大流量|实验性
    type: load-balance
  - name: 新加坡节点
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png
    include-all: true
    filter: 新加坡|坡|狮城|SG|Singapore|🇸🇬
    exclude-filter: (?i)家宽|家庭|家庭宽带|商宽|商业宽带|星链|Starlink|落地|0\.[0-5]|低倍率|省流|大流量|实验性
    type: load-balance
  - name: 日本节点
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png
    include-all: true
    filter: 日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|🇯🇵
    exclude-filter: (?i)家宽|家庭|家庭宽带|商宽|商业宽带|星链|Starlink|落地|0\.[0-5]|低倍率|省流|大流量|实验性
    type: load-balance
  - name: 美国节点
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png
    include-all: true
    filter: 美国|美|US|United States|🇺🇸
    exclude-filter: (?i)家宽|家庭|家庭宽带|商宽|商业宽带|星链|Starlink|落地|0\.[0-5]|低倍率|省流|大流量|实验性
    type: load-balance
  - name: GLOBAL
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    include-all: true
    type: select
    proxies:
      - 选择代理
      - 手动选择
      - 前置代理
      - 落地节点
      - AI
      - Crypto
      - GitHub
      - Discord
      - 低倍率节点
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
rule-providers:
  SogouInput:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://ruleset.skk.moe/Clash/non_ip/sogouinput.txt
    path: ./ruleset/SogouInput.txt
  StaticResources:
    type: http
    behavior: domain
    format: text
    interval: 86400
    url: https://ruleset.skk.moe/Clash/domainset/cdn.txt
    path: ./ruleset/StaticResources.txt
  CDNResources:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://ruleset.skk.moe/Clash/non_ip/cdn.txt
    path: ./ruleset/CDNResources.txt
  TikTok:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/originalix/override-rules@master/ruleset/TikTok.list
    path: ./ruleset/TikTok.list
  EHentai:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/originalix/override-rules@master/ruleset/EHentai.list
    path: ./ruleset/EHentai.list
  SteamFix:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/originalix/override-rules@master/ruleset/SteamFix.list
    path: ./ruleset/SteamFix.list
  GoogleFCM:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/originalix/override-rules@master/ruleset/FirebaseCloudMessaging.list
    path: ./ruleset/FirebaseCloudMessaging.list
  AdditionalFilter:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/originalix/override-rules@master/ruleset/AdditionalFilter.list
    path: ./ruleset/AdditionalFilter.list
  AdditionalCDNResources:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/originalix/override-rules@master/ruleset/AdditionalCDNResources.list
    path: ./ruleset/AdditionalCDNResources.list
  Crypto:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/originalix/override-rules@master/ruleset/Crypto.list
    path: ./ruleset/Crypto.list
  GitHub:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/originalix/override-rules@master/ruleset/GitHub.list
    path: ./ruleset/GitHub.list
  Discord:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/powerfullz/override-rules@master/ruleset/Discord.list
    path: ./ruleset/Discord.list
rules:
  - RULE-SET,AdditionalFilter,REJECT
  - RULE-SET,SogouInput,REJECT
  - RULE-SET,Crypto,Crypto
  - RULE-SET,GitHub,GitHub
  - RULE-SET,Discord,Discord
  - GEOSITE,CATEGORY-AI-!CN,AI
  - RULE-SET,StaticResources,选择代理
  - RULE-SET,CDNResources,选择代理
  - RULE-SET,AdditionalCDNResources,选择代理
  - RULE-SET,SteamFix,DIRECT
  - RULE-SET,GoogleFCM,DIRECT
  - GEOSITE,GOOGLE-PLAY@CN,DIRECT
  - GEOSITE,MICROSOFT@CN,DIRECT
  - GEOSITE,BILIBILI,DIRECT
  - DOMAIN,services.googleapis.cn,选择代理
  - DOMAIN-SUFFIX,truthsocial.com,选择代理
  - RULE-SET,EHentai,选择代理
  - RULE-SET,TikTok,选择代理
  - GEOSITE,ONEDRIVE,选择代理
  - GEOSITE,MICROSOFT,选择代理
  - GEOSITE,TELEGRAM,选择代理
  - GEOSITE,YOUTUBE,选择代理
  - GEOSITE,GOOGLE,选择代理
  - GEOSITE,NETFLIX,选择代理
  - GEOSITE,SPOTIFY,选择代理
  - GEOSITE,BAHAMUT,选择代理
  - GEOSITE,PIKPAK,选择代理
  - GEOSITE,GFW,选择代理
  - GEOSITE,CN,DIRECT
  - GEOSITE,PRIVATE,DIRECT
  - GEOIP,CN,DIRECT
  - GEOIP,PRIVATE,DIRECT
  - MATCH,选择代理
sniffer:
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080
        - 8880
    QUIC:
      ports:
        - 443
        - 8443
  override-destination: false
  enable: true
  force-dns-mapping: true
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - +.push.apple.com
dns:
  enable: true
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29
    - 180.184.1.1
  fallback:
    - quic://dns0.eu
    - https://dns.cloudflare.com/dns-query
    - https://dns.sb/dns-query
    - tcp://208.67.222.222
    - tcp://8.26.56.2
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - tls://dot.pub
  fake-ip-filter:
    - geosite:private
    - geosite:connectivity-check
    - geosite:cn
    - Mijia Cloud
    - dig.io.mi.com
    - localhost.ptlogin2.qq.com
    - "*.icloud.com"
    - "*.stun.*.*"
    - "*.stun.*.*.*"
geodata-mode: true
geox-url:
  geoip: https://gcore.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
  geosite: https://gcore.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
  mmdb: https://gcore.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb
  asn: https://gcore.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb

